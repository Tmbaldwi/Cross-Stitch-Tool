<div class="card">
    <div class="color-display">
        <div [style.background-color]="colorHex()"></div>
        <div [style.background-color]="colorChoiceBg()"></div>
    </div>
    <div class="color-list">
        <div class="color-choice-container">
            @if(colorChoice() == null){
                Select a Thread
            }
            @else{
                {{ threadMasterList()[colorChoice()!].name }}
            }
            
        </div>
        <mat-radio-group
        [(ngModel)]="colorChoice">
            @for (option of colorOptions(); track option) {
            <mat-radio-button 
                [value]="option"
                (change)="onColorChoice(option)"
            >
                {{threadMasterList()[option].name}}
            </mat-radio-button>
            }
        </mat-radio-group>
    </div>
</div>
