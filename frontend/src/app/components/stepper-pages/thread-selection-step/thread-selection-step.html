<div class="card">
    <p-splitter [panelSizes]="[25,75]" [style]="{ height: '1000px' }" class="mb-8">
        <ng-template #panel>
            <div class="flex items-center justify-center h-full">Panel 1</div>
        </ng-template>
        <ng-template #panel>
            <div class="container">
                <div class="contents">
                    <app-image-frame 
                        class="image-frame"
                        [isLoading]="isLoading()"
                        [showTextBox]="true"
                        [errorMessage]="errorMessage()"
                    >
                        <canvas #canvas></canvas>
                    </app-image-frame>
                    <div class="text-box">
                        Nothing for now
                    </div>
                    <div class="button-container">
                        <div class="back-button-box">
                            <button 
                                matButton="filled"
                                matStepperPrevious
                                class="light-scheme-button"
                            >
                                &larr; Back
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </ng-template>
    </p-splitter>
</div>
